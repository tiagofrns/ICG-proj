<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Padaria Artesanal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HUD principal -->
<div id="hud">
  <div id="money-box">
    <div id="money-label">Caixa Registadora</div>
    <span id="money">0,00 €</span>
  </div>

  <div id="state-box">
    <b>Padeiro</b>
    <span id="state">Mãos livres</span>
    <div style="margin-top:8px; height:6px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden;">
      <div id="stamina-bar" style="height:100%; width:100%; background:linear-gradient(90deg,#44ccff,#0088ff); transition:width 0.1s;"></div>
    </div>
  </div>

  <div id="controls-box">
    <b>Padaria Artesanal</b><br>
    <b>WASD</b> · mover<br>
    <b>E</b> · pegar massa (mesa)<br>
    <b>Q</b> · amassar (mesa)<br>
    <b>F</b> · colocar no forno<br>
    <b>SPACE</b> · tirar do forno<br>
    <b>R</b> · vender ao cliente
  </div>
</div>

<!-- HUD do forno -->
<div id="oven-hud">
  <b>FORNO</b>
  <div id="oven-timer">Vazio</div>
  <div id="oven-bar-bg"><div id="oven-bar"></div></div>
</div>

<!-- Painel lateral de clientes -->
<div id="customers-panel"></div>

<!-- Notificação central -->
<div id="notif"></div>

<!-- Passos da receita -->
<div id="recipe-hud">
  <b>Receita</b>
  <div class="recipe-step" id="step-dough">Pegar massa</div>
  <div class="recipe-step" id="step-knead">Amassar (Q)</div>
  <div class="recipe-step" id="step-oven">Levar ao forno</div>
  <div class="recipe-step" id="step-bake">Aguardar</div>
  <div class="recipe-step" id="step-take">Tirar do forno</div>
  <div class="recipe-step" id="step-sell">Vender (R)</div>
</div>

<script type="importmap">
{
  "imports": {
    "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/main.js"></script>

</body>
</html>
