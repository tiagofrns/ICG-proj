<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Padaria Artesanal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;font-family:'Lato',sans-serif;background:#111}

#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:15px;pointer-events:none;
}

#money-box{
  background:linear-gradient(135deg,rgba(20,12,5,0.95),rgba(40,20,8,0.9));
  border:1px solid #c8960c;
  border-radius:12px;
  padding:12px 20px;
  color:#f5d060;
  font-family:'Playfair Display',serif;
  font-size:26px;
  font-weight:700;
  letter-spacing:1px;
  text-shadow:0 0 20px #c8960c88;
  box-shadow:0 4px 30px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,220,100,0.2);
  min-width:150px;
  text-align:center;
}
#money-label{font-size:10px;letter-spacing:3px;color:#c8960c;font-family:'Lato';font-weight:300;text-transform:uppercase;margin-bottom:2px}

#controls-box{
  background:rgba(10,6,2,0.88);
  border:1px solid rgba(200,150,12,0.3);
  border-radius:12px;
  padding:12px 16px;
  color:#d4b896;
  font-size:12px;
  line-height:1.8;
  letter-spacing:0.5px;
}
#controls-box b{color:#f5d060;font-family:'Playfair Display';font-size:13px}

#state-box{
  background:rgba(10,6,2,0.88);
  border:1px solid rgba(200,150,12,0.3);
  border-radius:12px;
  padding:12px 18px;
  color:#d4b896;
  font-size:13px;
  min-width:160px;
  text-align:center;
}
#state-box b{color:#f5d060;display:block;margin-bottom:5px;font-family:'Playfair Display'}

#oven-hud{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,rgba(20,10,2,0.95),rgba(50,25,5,0.9));
  border:1px solid #b85c1a;
  border-radius:14px;
  padding:14px 24px;
  color:#f4d0a0;
  text-align:center;
  min-width:240px;
  box-shadow:0 4px 30px rgba(200,80,0,0.2);
}
#oven-hud b{font-family:'Playfair Display';font-size:14px;letter-spacing:2px;color:#e8a050}
#oven-timer{font-size:13px;margin:6px 0 8px;color:#d4b896}
#oven-bar-bg{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
#oven-bar{height:100%;width:0%;background:linear-gradient(90deg,#c84b00,#ff8c00,#ffd700);border-radius:4px;transition:width 0.2s}

/* PAINEL */
#customers-panel{
  position:absolute;right:15px;top:80px;
  display:flex;flex-direction:column;gap:10px;
  pointer-events:none;
}
.customer-card{
  background:linear-gradient(135deg,rgba(10,6,2,0.95),rgba(30,15,5,0.9));
  border:1px solid rgba(200,150,50,0.4);
  border-radius:12px;
  padding:12px 16px;
  color:#d4b896;
  font-size:12px;
  min-width:170px;
  animation:slideIn 0.4s ease;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.customer-card.urgent{border-color:#cc2200;box-shadow:0 4px 20px rgba(200,30,0,0.3)}
.customer-card .cname{font-family:'Playfair Display';color:#f5d060;font-size:13px;margin-bottom:4px}
.customer-card .order{color:#e8c87a;margin:3px 0}
.customer-card .patience-bar{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:8px}
.customer-card .patience{height:100%;background:linear-gradient(90deg,#22cc44,#cccc00);border-radius:3px;transition:width 0.5s}
.customer-card .patience.low{background:linear-gradient(90deg,#cc0000,#cc4400)}

@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

#notif{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(10,6,2,0.95);
  border:1px solid #c8960c;
  border-radius:14px;
  padding:16px 28px;
  color:#f5d060;
  font-family:'Playfair Display';
  font-size:20px;
  text-align:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.3s;
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 60px rgba(200,150,12,0.15);
}

#recipe-hud{
  position:absolute;bottom:20px;right:15px;
  background:rgba(10,6,2,0.9);
  border:1px solid rgba(200,150,12,0.3);
  border-radius:12px;
  padding:12px 16px;
  color:#d4b896;
  font-size:12px;
  min-width:150px;
}
#recipe-hud b{font-family:'Playfair Display';color:#f5d060;display:block;margin-bottom:6px}
.recipe-step{padding:3px 0;display:flex;align-items:center;gap:6px}
.recipe-step.done{color:#22cc44;text-decoration:line-through;opacity:0.6}
.recipe-step.active{color:#f5d060;font-weight:bold}
.recipe-step::before{content:'○';font-size:10px}
.recipe-step.done::before{content:'✓'}
.recipe-step.active::before{content:'●';color:#f5d060}

canvas{display:block}
</style>
</head>
<body>

<div id="hud">
  <div id="money-box">
    <div id="money-label">Caixa Registadora</div>
    <span id="money">0,00 €</span>
  </div>
  <div id="state-box">
    <b>Padeiro</b>
    <span id="state">Mãos livres</span>
  </div>
  <div id="controls-box">
    <b> Padaria Artesanal</b><br>
    <b>WASD</b> · mover<br>
    <b>E</b> · pegar massa (mesa)<br>
    <b>Q</b> · amassar (mesa)<br>

</div>

<div id="oven-hud">
  <b>FORNO</b>
  <div id="oven-timer">Vazio</div>
  <div id="oven-bar-bg"><div id="oven-bar"></div></div>
</div>

<div id="customers-panel" id="customers-panel"></div>

<div id="notif"></div>

<div id="recipe-hud">
  <b>Receita</b>
  <div class="recipe-step" id="step-dough">Pegar massa</div>
  <div class="recipe-step" id="step-knead">Amassar (Q)</div>
  <div class="recipe-step" id="step-oven">Levar ao forno</div>
  <div class="recipe-step" id="step-bake">Aguardar</div>
  <div class="recipe-step" id="step-take">Tirar do forno</div>
  <div class="recipe-step" id="step-sell">Vender (R)</div>
</div>

<script type="importmap">
{
  "imports":{
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}

</script>






<script type="module">
import * as THREE from 'three'
import {OrbitControls} from 'three/addons/controls/OrbitControls.js'
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'



const gltfLoader = new GLTFLoader()

function loadProp(url, x, y, z, scale = 1, rotationY = 0) {
  gltfLoader.load(
    url,
    (gltf) => {
      const model = gltf.scene
      
      model.position.set(x, y, z)
      model.scale.set(scale, scale, scale)
      model.rotation.y = rotationY

      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true
          child.receiveShadow = true
        }
      })

      scene.add(model)
    },
    undefined, 
    (error) => {
      console.error('Erro ao carregar o modelo:', error)
    }
  )
}

//  RENDERER 
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.1
renderer.outputColorSpace = THREE.SRGBColorSpace
document.body.appendChild(renderer.domElement)

//  CENA 
const scene = new THREE.Scene()
scene.background = new THREE.Color(0xf7f0e8)
scene.fog = new THREE.FogExp2(0xf0e8dc, 0.018)

//  CAMARA 
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200)


//  LUZES 
const sun = new THREE.DirectionalLight(0xfff5e0, 2.5)
sun.position.set(20, 35, 25)
sun.castShadow = true
sun.shadow.mapSize.set(2048, 2048)
sun.shadow.camera.near = 0.5
sun.shadow.camera.far = 100
sun.shadow.camera.left = -30
sun.shadow.camera.right = 30
sun.shadow.camera.top = 30
sun.shadow.camera.bottom = -30
sun.shadow.bias = -0.001
scene.add(sun)

scene.add(new THREE.AmbientLight(0xfff0e0, 0.6))
scene.add(new THREE.HemisphereLight(0xffe8cc, 0x8b6040, 0.4))

const fillLight = new THREE.DirectionalLight(0xffe0b0, 0.5)
fillLight.position.set(-15, 8, -20)
scene.add(fillLight)

//  MATERIAIS 
const M = {
  floor: new THREE.MeshStandardMaterial({color:'#c49a6c',roughness:0.85,metalness:0.0}),
  wall:  new THREE.MeshStandardMaterial({color:'#f2ead8',roughness:0.9}),
  wallAccent: new THREE.MeshStandardMaterial({color:'#e8d4b0',roughness:0.8}),
  woodDark: new THREE.MeshStandardMaterial({color:'#5c3010',roughness:0.8}),
  woodMed:  new THREE.MeshStandardMaterial({color:'#7a4a20',roughness:0.75}),
  woodLight:new THREE.MeshStandardMaterial({color:'#a06030',roughness:0.7}),
  metalGrey:new THREE.MeshStandardMaterial({color:'#888',metalness:0.85,roughness:0.25}),
  metalDark:new THREE.MeshStandardMaterial({color:'#555',metalness:0.9,roughness:0.2}),
  glass:    new THREE.MeshStandardMaterial({color:'#b8d8f0',metalness:0.1,roughness:0.05,transparent:true,opacity:0.45}),
  flour:    new THREE.MeshStandardMaterial({color:'#f5ede0',roughness:0.95}),
  doughRaw: new THREE.MeshStandardMaterial({color:'#f0deb8',roughness:0.9}),
  breadRaw: new THREE.MeshStandardMaterial({color:'#d4b87a',roughness:0.85}),
  breadDone:new THREE.MeshStandardMaterial({color:'#7a3d10',roughness:0.6}),
  tile:     new THREE.MeshStandardMaterial({color:'#e8ddd0',roughness:0.7}),
  counter:  new THREE.MeshStandardMaterial({color:'#f8f0e0',roughness:0.3,metalness:0.1}),
}


//  HELPER 
function add(geo, mat, x, y, z, rx = 0, ry = 0, rz = 0) {
  const m = new THREE.Mesh(geo, mat)
  m.position.set(x, y, z)
  m.rotation.set(rx, ry, rz)
  m.castShadow = true
  m.receiveShadow = true
  scene.add(m)
  return m
}

//  CHAO 
add(new THREE.PlaneGeometry(44.4, 35.4), M.floor, 0, 0, 4.5, -Math.PI / 2)
for (let i = -22; i <= 22; i += 2) {
  add(new THREE.PlaneGeometry(0.05, 35.4),
    new THREE.MeshStandardMaterial({ color: '#a07040', roughness: 1 }),
    i, 0.002, 4.5, -Math.PI / 2)
}

//  PAREDES 
add(new THREE.BoxGeometry(44.8, 7, 0.4), M.wall, 0, 3.5, -13)         
add(new THREE.BoxGeometry(0.4, 7, 35), M.wall, -22, 3.5, 4.5)         
add(new THREE.BoxGeometry(0.4, 7, 35), M.wall, 22, 3.5, 4.5)          
add(new THREE.BoxGeometry(18, 7, 0.4), M.wall, -16, 3.5, 22)        
add(new THREE.BoxGeometry(18, 7, 0.4), M.wall, 16, 3.5, 22)         

//rodapes
add(new THREE.BoxGeometry(14, 1.5, 0.15), M.woodMed, -7, 0.8, -12.8) 
add(new THREE.BoxGeometry(14, 1.5, 0.15), M.woodMed,  7, 0.8, -12.8)

//  CANDEEIROS 
function pendantLight(x, z) {
  add(new THREE.CylinderGeometry(0.02, 0.02, 1.5), M.metalDark, x, 6.2, z)
  const shade = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.5, 16, 1, true), M.metalGrey)
  shade.rotation.x = Math.PI; shade.position.set(x, 5.3, z); scene.add(shade)
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshStandardMaterial({ emissive: '#ffe8a0', emissiveIntensity: 3, color: '#fff' }))
  bulb.position.set(x, 5.2, z); scene.add(bulb)
  const pl = new THREE.PointLight('#ffd580', 1.5, 12)
  pl.position.set(x, 4.8, z); scene.add(pl)
}
pendantLight(-10, -5); pendantLight(0, -5); pendantLight(10, -5)
pendantLight(-5, 5);   pendantLight(5, 5)

//  JANELAS 
function addWindow(x, z, ry = 0) {
  const g = new THREE.Group()
  g.add(new THREE.Mesh(new THREE.BoxGeometry(4.2, 3.5, 0.25),
    new THREE.MeshStandardMaterial({ color: '#c8b090', roughness: 0.6 })))
  const glass = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 3), M.glass)
  glass.position.z = 0.13; g.add(glass)
  const mv = new THREE.Mesh(new THREE.BoxGeometry(0.08, 3, 0.26),
    new THREE.MeshStandardMaterial({ color: '#b89868' }))
  const mh = new THREE.Mesh(new THREE.BoxGeometry(4, 0.08, 0.26),
    new THREE.MeshStandardMaterial({ color: '#b89868' }))
  mh.position.y = 0.3; g.add(mv); g.add(mh)
  const sill = new THREE.Mesh(new THREE.BoxGeometry(4.6, 0.15, 0.5),
    new THREE.MeshStandardMaterial({ color: '#d8c8a0', roughness: 0.5 }))
  sill.position.set(0, -1.82, 0.3); g.add(sill)
  g.position.set(x, 3.2, z); g.rotation.y = ry; scene.add(g)
  const shaft = new THREE.PointLight('#fff5e0', 0.8, 14)
  shaft.position.set(x, 3, z + 1); scene.add(shaft)
}
addWindow(-12, -12.6) 
addWindow(8, -12.6)
addWindow(-21.6, 0, Math.PI / 2)
//  PORTA 
add(new THREE.BoxGeometry(3.5, 6, 0.3), M.woodDark, 0, 3, 21.85)
add(new THREE.BoxGeometry(3, 5.5, 0.1), M.woodMed, 0, 2.75, 21.8)
const doorGlass = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 2), M.glass)
doorGlass.position.set(0, 3.8, 21.86); scene.add(doorGlass)
add(new THREE.CylinderGeometry(0.04, 0.04, 0.8), M.metalGrey, 0.5, 2.6, 21.9, 0, 0, Math.PI / 2)

//  BALCAO 
add(new THREE.BoxGeometry(10, 1.05, 2), M.woodDark, 14, 0.52, 4)
add(new THREE.BoxGeometry(10.1, 0.12, 2.1), M.counter, 14, 1.12, 4)
add(new THREE.BoxGeometry(0.08, 1.05, 2), M.woodDark, 9, 0.52, 4)
add(new THREE.BoxGeometry(0.08, 1.05, 2), M.woodDark, 19, 0.52, 4)
const dispGlass = new THREE.Mesh(new THREE.BoxGeometry(9, 0.7, 0.08), M.glass)
dispGlass.position.set(14, 0.75, 3.04); scene.add(dispGlass)
for (let i = 0; i < 5; i++) {
  add(new THREE.CylinderGeometry(0.2, 0.22, 0.18, 16),
    new THREE.MeshStandardMaterial({ color: '#7a3d10', roughness: 0.6 }), 10.5 + i * 1.8, 0.6, 3.9)
  const top = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 8),
    new THREE.MeshStandardMaterial({ color: '#8b4520', roughness: 0.65 }))
  top.position.set(10.5 + i * 1.8, 0.79, 3.9); top.scale.y = 0.5; scene.add(top)
}

//  CAIXA REGISTADORA 
function buildCashRegister(x, z) {
  const g = new THREE.Group()
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.8),
    new THREE.MeshStandardMaterial({ color: '#2a2a2a', metalness: 0.6, roughness: 0.4 }))
  body.position.y = 0.4; g.add(body)
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.4),
    new THREE.MeshStandardMaterial({ color: '#00ff88', emissive: '#00cc66', emissiveIntensity: 0.8 }))
  screen.position.set(0, 0.65, 0.36); g.add(screen)
  for (let r = 0; r < 3; r++) for (let c = 0; c < 4; c++) {
    const key = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 0.12), M.metalGrey)
    key.position.set(-0.18 + c * 0.14, 0.22, -0.05 + r * 0.13); g.add(key)
  }
  const gl = new THREE.PointLight('#00ff88', 0.4, 3)
  gl.position.set(0, 1, 0.4); g.add(gl)
  g.position.set(x, 1.12, z); scene.add(g)
}
buildCashRegister(17, 3.2)

// ─── MESAS DE TRABALHO E COMIDAS ──────────────────────────────────────────
function buildWorkTable(x, z) {
  const g = new THREE.Group()
  for (let dx of [-1.4, 1.4]) for (let dz of [-0.85, 0.85]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.0, 0.12), M.woodDark)
    leg.position.set(dx, 0.5, dz); g.add(leg)
  }
  const top = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2),
    new THREE.MeshStandardMaterial({ color: '#f0ede0', roughness: 0.5 }))
  top.position.y = 1.05; g.add(top)
  const pin = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 1.2, 16),
    new THREE.MeshStandardMaterial({ color: '#d4b080', roughness: 0.6 }))
  pin.rotation.z = Math.PI / 2; pin.position.set(0, 1.12, 0.4); g.add(pin)
  const dust = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 1.5),
    new THREE.MeshStandardMaterial({ color: '#f8f4ec', transparent: true, opacity: 0.4 }))
  dust.rotation.x = -Math.PI / 2; dust.position.set(0, 1.11, 0); g.add(dust)
  const bowl = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2), M.flour)
  bowl.rotation.x = Math.PI; bowl.position.set(-0.8, 1.1, -0.4); g.add(bowl)
  g.position.set(x, 0, z); scene.add(g)
}

buildWorkTable(-12, 6)   // Mesa original
buildWorkTable(-12, 0)   // Mesa central esquerda
buildWorkTable(-12, -6)  // Mesa traseira esquerda
buildWorkTable(8, -6)    // Mesa traseira direita

loadProp('models/Bread.glb', -12, 1.15, 6, 0.5, Math.random() * Math.PI)
loadProp('models/Burger.glb', -12, 1.15, 0, 0.5, Math.random() * Math.PI)
loadProp('models/Pan.glb', -12, 1.15, -6, 0, 0.5)
loadProp('models/Pizza.glb', 8, 1.15, -6, 0.5, Math.random() * Math.PI)


loadProp('models/Kitchen.glb', 16, 2, -12, 0.5, Math.PI)

//  SACOS DE FARINHA 
function flourSack(x, z) {
  const g = new THREE.Group()
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.44, 1.0, 12), M.flour)
  body.position.y = 0.5; g.add(body)
  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.38, 0.2, 12), M.flour)
  top.position.y = 1.1; g.add(top)
  const knot = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), M.flour)
  knot.position.y = 1.22; g.add(knot)
  g.position.set(x, 0, z); scene.add(g)
}
flourSack(-14, 3); flourSack(-13, 4.2); flourSack(-11, 3.4)

// loadProp(url, x, y, z, scale, rotationY)
loadProp('models/Oven.glb', 0, 0, -12, 1.25, 0)

const ovenGlow = new THREE.PointLight('#ff7b2f', 3, 7)
ovenGlow.position.set(0, 1.5, -9.5)
scene.add(ovenGlow)

//  PRATELEIRA 
function buildShelf(x, z) {
  const g = new THREE.Group()
  const back = new THREE.Mesh(new THREE.BoxGeometry(5, 4.5, 0.2), M.woodDark)
  back.position.set(0, 2.25, -0.5); g.add(back)
  for (let sh = 0; sh < 3; sh++) {
    const board = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.1, 0.8), M.woodMed)
    board.position.set(0, 0.8 + sh * 1.5, 0); g.add(board)
    for (let i = 0; i < 4; i++) {
      const brd = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.6, 16),
        new THREE.MeshStandardMaterial({ color: '#7a3d12', roughness: 0.6 }))
      brd.rotation.z = 0.15; brd.position.set(-1.5 + i * 1.0, 0.95 + sh * 1.5, -0.1); g.add(brd)
    }
  }
  g.position.set(x, 0, z); scene.add(g)
}
buildShelf(-17, -12)

//  QUADRO DE MENU 
add(new THREE.BoxGeometry(4.3, 2.8, 0.1), M.woodDark, -5, 3, -12.45)
add(new THREE.BoxGeometry(4, 2.5, 0.15),
  new THREE.MeshStandardMaterial({ color: '#1a2a1a', roughness: 0.9 }), -5, 3, -12.5)

//  PLANTAS
function addPlant(x, z) {
  add(new THREE.CylinderGeometry(0.3, 0.25, 0.5, 12),
    new THREE.MeshStandardMaterial({ color: '#8b4513', roughness: 0.9 }), x, 0.25, z)
  for (let i = 0; i < 8; i++) {
    const ang = i / 8 * Math.PI * 2, r = 0.25 + Math.random() * 0.15
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 6),
      new THREE.MeshStandardMaterial({ color: '#2d6a2d', roughness: 0.8 }))
    leaf.position.set(x + Math.cos(ang) * r, 0.7 + Math.random() * 0.3, z + Math.sin(ang) * r)
    leaf.scale.set(1, 0.6, 1); scene.add(leaf)
  }
}
addPlant(-21, 20); addPlant(20, 20)

//  BANCOS 
function stool(x, z) {
  add(new THREE.CylinderGeometry(0.3, 0.3, 0.06, 16), M.woodMed, x, 0.85, z)
  add(new THREE.CylinderGeometry(0.04, 0.04, 0.8, 8), M.metalDark, x, 0.45, z)

      g.add(ball)

      }

    if(this.item){ this.item.position.set(0.1,-0.75,0.12); this.armRGroup.add(this.item) }
  }

  walkAnim(dt){
    this._walkT += dt
    const t = this._walkT
    if(moving){
      // leg swing
      this.legL.rotation.x = Math.sin(t*6)*0.38
      this.legR.rotation.x = -Math.sin(t*6)*0.38
      // arm counter-swing
      this.armLGroup.rotation.x = Math.sin(t*6)*0.28
      this.armRGroup.rotation.x = -Math.sin(t*6)*0.28
      // subtle body bob
      this.group.position.y = Math.abs(Math.sin(t*6))*0.04
    } else {
      // idle sway
      this.legL.rotation.x += (0-this.legL.rotation.x)*0.12
      this.legR.rotation.x += (0-this.legR.rotation.x)*0.12
      this.armLGroup.rotation.x += (0-this.armLGroup.rotation.x)*0.12
      this.armRGroup.rotation.x += (0-this.armRGroup.rotation.x)*0.12
      this.group.position.y += (0-this.group.position.y)*0.1
      // gentle idle head bob
      this.headGroup.rotation.z = Math.sin(t*0.8)*0.02
    }
    // always slightly sway arms sideways
    this.armLGroup.rotation.z = 0.25 + Math.sin(t*0.5)*0.03
    this.armRGroup.rotation.z = -0.25 - Math.sin(t*0.5)*0.03
  }

}

//keys
const keys={}
window.addEventListener('keydown',e=>{
  keys[e.code]=true
  // E: pegar massa
  if(e.code==='KeyE' && !player.hasDough && !player.hasKneadedDough && !player.hasBread){
    if(dist(px,pz,-12,6)<3.5){ player.hasDough=true; player.kneadCount=0; player.updateItem(); notify(' Massa apanhada! 🥣 Amassa com Q') }
  }
  // Q: amassar
  if(e.code==='KeyQ' && player.hasDough){
    if(dist(px,pz,-12,6)<3.5){
      player.kneadCount++
      if(player.kneadCount>=3){ player.hasDough=false; player.hasKneadedDough=true; player.updateItem(); notify('Massa amassada! Agora leva ao forno (F)') }
      else { notify(`💪 A amassar... (${player.kneadCount}/3)`) }
    }
  }
  // F: forno
  if(e.code==='KeyF' && player.hasKneadedDough && !ovenBread){
    if(dist(px,pz,0,-10)<4){ player.hasKneadedDough=false; player.updateItem(); ovenBread=new OvenBread(); notify('No forno 🔥! Aguarda 12 segundos...') }
  }
  // SPACE: tirar
  if(e.code==='Space'){
    if(ovenBread && ovenBread.done && dist(px,pz,0,-10)<4){ ovenBread.remove(); ovenBread=null; player.hasBread=true; player.updateItem(); notify('🍞 Pão pronto! Vende a um cliente (R)') }
  }
  // R: vender
  if(e.code==='KeyR' && player.hasBread){
    let sold=false
    for(let c of customers){
      if(!c.satisfied&&!c.angry && dist(px,pz,c.group.position.x,c.group.position.z)<4){
        player.hasBread=false; player.updateItem()
        addMoney(c.price); c.leave(true)
        sold=true; break
      }
    }
    if(!sold) notify('❗ Chega-te a um cliente!')
  }
})

const clock=new THREE.Clock()
function animate(){
  requestAnimationFrame(animate)
  const dt=clock.getDelta()

  // movement
  moving=false
  const speed=0.12
  if(keys['KeyW']){ pz-=speed; moving=true; pAngle=Math.PI }
  if(keys['KeyS']){ pz+=speed; moving=true; pAngle=0 }
  
  if(keys['KeyA']){ px-=speed; moving=true; pAngle=-Math.PI/2 }
  if(keys['KeyD']){ px+=speed; moving=true; pAngle=Math.PI/2 }
  
  if(keys['KeyW']&&keys['KeyD']) pAngle=Math.PI*0.75
  if(keys['KeyW']&&keys['KeyA']) pAngle=-Math.PI*0.75

  px=Math.max(-20,Math.min(20,px))
  pz=Math.max(-10,Math.min(20,pz)) 
  player.group.position.set(px,0,pz)

  if(moving) {
    let diff = pAngle - player.group.rotation.y;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    player.group.rotation.y += diff * 0.15;
  }
  player.walkAnim(dt)

  // oven
  if(ovenBread) ovenBread.update(dt)

  // customers
  spawnTimer+=dt
  if(spawnTimer>=nextSpawnTime){ spawnTimer=0; nextSpawnTime=10+Math.random()*15; spawnCustomer() }
  for(let c of customers) c.update(dt)

  //camara 3 pessoa
  const offset = new THREE.Vector3(0, 8, 12)
  offset.add(player.group.position)
  camera.position.lerp(offset, 0.1)
  camera.lookAt(player.group.position.x, player.group.position.y + 1, player.group.position.z)


  updateUI()
  
  renderer.render(scene,camera)
}
animate()

// initial spawn
setTimeout(spawnCustomer, 2000)

















</script>
